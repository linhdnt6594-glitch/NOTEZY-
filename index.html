<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V7 Ultra Professional</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4200/4200052.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --work: #3B82F6;
            --personal: #EC4899;
            --glass: rgba(255, 255, 255, 0.25);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #D4C4FB, #FFDEE9);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .screen {
            position: absolute; width: 100%; height: 100%; padding: 25px; box-sizing: border-box;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
        }
        .hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
        .active { opacity: 1; transform: scale(1); z-index: 10; }

        /* Trang 1 */
        #landing { justify-content: center; align-items: center; text-align: center; }
        .logo-3d { font-size: 100px; animation: float 3s ease-in-out infinite; cursor: pointer; }
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }
        
        .mic-main {
            width: 120px; height: 120px; border-radius: 50%; background: white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer; margin: 30px 0;
            border: 4px solid transparent; transition: 0.3s;
        }
        .recording { border-color: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 30px rgba(255, 71, 87, 0);} 100% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);} }

        /* Trang 2 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 12px; border-radius: 15px; text-align: center; font-weight: 800;
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); transition: 0.3s;
        }
        .tab.active-work { background: var(--work); color: white; }
        .tab.active-pers { background: var(--personal); color: white; }

        .note-list { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .note-card {
            background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px;
            padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        .tag { font-size: 10px; padding: 3px 8px; border-radius: 8px; color: white; margin-right: 10px; text-transform: uppercase; font-weight: 800; }
        .tag-work { background: var(--work); }
        .tag-pers { background: var(--personal); }

        .input-area { position: fixed; bottom: 25px; left: 25px; right: 25px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 20px; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-weight: 600; outline: none; }
        .btn-small { width: 50px; height: 50px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .loading-ring { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; z-index: 100; display: none; }
    </style>
</head>
<body>

<div id="loading" class="loading-ring">Đang phân tích...</div>

<div id="landing" class="screen active">
    <div class="logo-3d" onclick="responsiveVoice.speak('Chào đại gia Khải, muốn note gì nói tui nghe', 'Vietnamese Female')">📓</div>
    <h1 style="font-weight: 800; letter-spacing: -1px;">NOTEZY V7</h1>
    <div class="mic-main" id="mic-1" onclick="handleMicClick()">
        <span class="material-icons-round" style="font-size: 48px;">mic</span>
    </div>
    <p style="font-weight: 600; opacity: 0.6;" onclick="switchPage('workspace')">Hoặc chạm để xem danh sách</p>
</div>

<div id="workspace" class="screen hidden">
    <div class="header">
        <h2 style="margin:0; font-weight: 800;">Dòng thời gian</h2>
        <span class="material-icons-round" onclick="switchPage('landing')">home</span>
    </div>

    <div class="tabs">
        <div class="tab active-work" id="tab-work" onclick="setTab('work')">CÔNG VIỆC</div>
        <div class="tab" id="tab-pers" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>

    <div class="note-list" id="list"></div>

    <div class="input-area">
        <input type="text" id="text-in" placeholder="Nhập nhanh..." onkeypress="if(event.key==='Enter') addText()">
        <div class="btn-small" onclick="addText()"><span class="material-icons-round">send</span></div>
        <div class="btn-small" id="mic-2" onclick="handleMicClick()"><span class="material-icons-round">mic</span></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng"; // Key của cưng
    let currentTab = 'work';
    let notes = JSON.parse(localStorage.getItem('notezy_v7')) || [];
    let recognition;
    let isRecording = false;

    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        recognition = new Speech();
        recognition.lang = 'vi-VN';
        recognition.onstart = () => { isRecording = true; updateMicUI(true); };
        recognition.onend = () => { isRecording = false; updateMicUI(false); };
        recognition.onresult = (e) => { processAI(e.results[0][0].transcript); };
    }

    function handleMicClick() {
        if(!isRecording) {
            if(document.getElementById('landing').classList.contains('active')) {
                switchPage('workspace');
            }
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    function updateMicUI(on) {
        const m1 = document.getElementById('mic-1');
        const m2 = document.getElementById('mic-2');
        if(on) { m1.classList.add('recording'); m2.classList.add('recording'); }
        else { m1.classList.remove('recording'); m2.classList.remove('recording'); }
    }

    function switchPage(p) {
        if(p === 'workspace') {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('landing').classList.remove('active');
            document.getElementById('workspace').classList.add('active');
            document.getElementById('workspace').classList.remove('hidden');
        } else {
            document.getElementById('workspace').classList.add('hidden');
            document.getElementById('workspace').classList.remove('active');
            document.getElementById('landing').classList.add('active');
            document.getElementById('landing').classList.remove('hidden');
        }
    }

    function setTab(t) {
        currentTab = t;
        document.getElementById('tab-work').className = t === 'work' ? 'tab active-work' : 'tab';
        document.getElementById('tab-pers').className = t === 'personal' ? 'tab active-personal' : 'tab';
        render();
    }

    async function processAI(txt) {
        document.getElementById('loading').style.display = 'block';
        const prompt = `Bạn là trợ lý nữ miền Nam nanh nọc. Phân loại câu "${txt}" vào "work" (công việc, học tập) hoặc "personal" (đời sống, mua sắm). Trả về JSON: {"type": "work/personal", "reply": "câu khịa", "clean_text": "nội dung ngắn gọn"}`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const clean = data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "");
            const result = JSON.parse(clean);

            notes.push({ id: Date.now(), text: result.clean_text, type: result.type, done: false });
            localStorage.setItem('notezy_v7', JSON.stringify(notes));
            responsiveVoice.speak(result.reply, "Vietnamese Female");
            setTab(result.type);
        } catch(e) {
            notes.push({ id: Date.now(), text: txt, type: currentTab, done: false });
            localStorage.setItem('notezy_v7', JSON.stringify(notes));
        }
        document.getElementById('loading').style.display = 'none';
        render();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        notes.filter(n => n.type === currentTab).reverse().forEach(n => {
            const div = document.createElement('div');
            div.className = 'note-card';
            div.innerHTML = `
                <span class="tag ${n.type==='work'?'tag-work':'tag-pers'}">${n.type}</span>
                <span style="flex:1; font-weight:600">${n.text}</span>
                <span class="material-icons-round" onclick="del(${n.id})" style="opacity:0.3">delete</span>
            `;
            list.appendChild(div);
        });
    }

    function del(id) {
        notes = notes.filter(n => n.id !== id);
        localStorage.setItem('notezy_v7', JSON.stringify(notes));
        render();
    }

    window.onload = () => { initSpeech(); render(); };
</script>

</body>
</html>
