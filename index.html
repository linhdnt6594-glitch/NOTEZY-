<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notezy VIP - Mic Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root {
            --brand-primary: #FF3366; --brand-secondary: #00C3FF;
            --text-main: #1E293B; --text-muted: #64748B;
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; height: 100dvh; width: 100%; overflow: hidden; background-color: #F8FAFC; }
        body::before { content: ""; position: absolute; inset: -50%; background: radial-gradient(circle at 50% 50%, #FFF5F7 0%, transparent 40%), radial-gradient(circle at 20% 80%, #E6F8FE 0%, transparent 40%), radial-gradient(circle at 80% 20%, #F3E8FE 0%, transparent 40%); animation: lightPan 20s infinite alternate linear; z-index: -2; }
        @keyframes lightPan { 100% { transform: translate(5%, 5%) rotate(5deg); } }

        .screen { position: absolute; inset: 0; transition: 0.5s ease-out; display: flex; flex-direction: column; box-sizing: border-box; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.98); }
        .active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }

        /* Trang 1 */
        #landing-page { justify-content: center; align-items: center; text-align: center; }
        .mic-btn-huge { width: 140px; height: 140px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; background: white; border: 2px solid white; box-shadow: 0 15px 35px rgba(0, 195, 255, 0.2); transition: 0.3s; }
        .mic-recording { border-color: var(--brand-primary) !important; box-shadow: 0 0 40px rgba(255, 51, 102, 0.4) !important; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Trang 2 */
        #workspace-page { padding: 30px 24px; }
        .note-list { flex: 1; overflow-y: auto; padding-bottom: 120px; display: flex; flex-direction: column; gap: 8px; }
        .note-card { padding: 14px 18px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.85); border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); animation: pop 0.3s ease; }
        .note-card.done { opacity: 0.5; filter: grayscale(1); }
        .note-card.done p { text-decoration: line-through; }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } }

        .checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #CBD5E1; margin-right: 15px; cursor: pointer; flex-shrink: 0; }
        .done .checkbox { background: var(--brand-secondary); border-color: var(--brand-secondary); display: flex; align-items: center; justify-content: center; }
        .done .checkbox::after { content: '✓'; color: white; font-weight: 900; font-size: 14px; }

        /* Dock */
        .input-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 48px); max-width: 600px; display: flex; gap: 12px; z-index: 100; }
        .input-wrapper { flex: 1; display: flex; background: white; border-radius: 20px; padding: 0 15px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { flex: 1; border: none; outline: none; padding: 16px 5px; font-size: 1rem; font-weight: 600; }
        .btn-small-mic { width: 60px; height: 60px; border-radius: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* Thông báo trình duyệt lỗi */
        #browser-warning { position: fixed; top: 20px; left: 20px; right: 20px; background: #FFF4E5; color: #663C00; padding: 15px; border-radius: 15px; border: 1px solid #FFE2B7; z-index: 9999; display: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="browser-warning">⚠️ Cưng ơi! Trình duyệt này hổng hỗ trợ Mic. Copy link dán vô <b>Chrome</b> hoặc <b>Safari</b> mới xài được nha!</div>

    <div id="landing-page" class="screen active" onclick="goToWorkspace()">
        <h1 style="font-family:'Outfit'; font-size:3.5rem; margin-bottom:50px; background: linear-gradient(135deg, var(--text-main), var(--brand-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Notezy VIP</h1>
        <div class="mic-btn-huge" id="main-mic-btn" onclick="event.stopPropagation(); startVoice();">
            <span class="material-icons-round" style="font-size:64px; color:var(--text-main);">mic</span>
        </div>
        <p style="margin-top:40px; font-weight:700; color:var(--text-muted); opacity: 0.6;">CHẠM MIC ĐỂ NÓI NÀ CƯNG</p>
    </div>

    <div id="workspace-page" class="screen hidden">
        <h2 style="font-family:'Outfit'; margin:0 0 25px 24px; font-size:2.2rem;">Sổ của Cưng 📓</h2>
        <div class="note-list" id="note-container"></div>
        <div class="input-area">
            <form class="input-wrapper" onsubmit="event.preventDefault(); submitText();">
                <input type="text" id="text-input" placeholder="Gõ lệnh ở đây nà..." autocomplete="off">
                <span class="material-icons-round" onclick="submitText()" style="color:var(--brand-secondary); cursor:pointer;">send</span>
            </form>
            <div class="btn-small-mic" id="workspace-mic-btn" onclick="startVoice()"><span class="material-icons-round" style="color:var(--brand-primary); font-size: 30px;">mic</span></div>
        </div>
    </div>

    <script>
        const AI_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
        let notes = JSON.parse(localStorage.getItem('notezy_immortal_v2')) || [];
        let isListening = false, recognition;

        function initApp() {
            renderNotes();
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech();
                recognition.lang = 'vi-VN';
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.onstart = () => { isListening = true; updateMicUI(true); };
                recognition.onend = () => { isListening = false; updateMicUI(false); };
                recognition.onresult = (e) => {
                    const result = e.results[0][0].transcript;
                    if(result) processInput(result);
                };
                recognition.onerror = (e) => { console.error("Mic error:", e.error); isListening = false; updateMicUI(false); };
            } else {
                document.getElementById('browser-warning').style.display = 'block';
            }
        }

        async function processInput(txt) {
            goToWorkspace();
            const raw = txt.toLowerCase();
            const isDone = /\bxong\b/.test(raw);
            let clean = txt.replace(/\bxong\b/gi, "").trim();
            if(!clean) return;

            // Xử lý XONG offline ngay lập tức
            if(isDone) {
                let found = false;
                for(let n of notes) {
                    if(!n.is_done && clean.length > 1 && n.item.toLowerCase().includes(clean.toLowerCase())) {
                        n.is_done = true; found = true; break;
                    }
                }
                if(found) { save(); responsiveVoice.speak("Xong rồi hả cưng? Giỏi!", "Vietnamese Female"); return; }
            }

            // Lưu note mới (Offline First)
            notes.unshift({ id: Date.now(), item: clean, is_done: isDone });
            save();

            // Gọi AI khịa nếu có mạng
            if(navigator.onLine) {
                try {
                    const res = await fetch(AI_URL, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Trả về JSON cực gọn: {"reply": "câu khịa gọi cưng", "item": "${clean}"}` }] }] })
                    });
                    const data = await res.json();
                    const ai = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
                    notes[0].item = ai.item; save();
                    responsiveVoice.speak(isDone ? "Làm xong rồi hả?" : ai.reply, "Vietnamese Female");
                } catch (e) { console.log("AI Offline Mode"); }
            } else {
                responsiveVoice.speak("Đã lưu nhen cưng!", "Vietnamese Female");
            }
        }

        function renderNotes() {
            const container = document.getElementById('note-container');
            container.innerHTML = '';
            notes.forEach((n, i) => {
                const div = document.createElement('div');
                div.className = `note-card ${n.is_done ? 'done' : ''}`;
                div.innerHTML = `<div class="checkbox" onclick="toggleDone(${i})"></div><p style="flex:1; margin:0; font-weight:700;">${n.item}</p><span class="material-icons-round" style="color:#CBD5E1; font-size: 20px;" onclick="del(${i})">delete</span>`;
                container.appendChild(div);
            });
        }

        function save() { localStorage.setItem('notezy_immortal_v2', JSON.stringify(notes)); renderNotes(); }
        function toggleDone(i) { notes[i].is_done = !notes[i].is_done; save(); if(notes[i].done) responsiveVoice.speak("Xong việc nà cưng!", "Vietnamese Female"); }
        function del(i) { notes.splice(i, 1); save(); }
        function startVoice() { 
            if(!recognition) { document.getElementById('browser-warning').style.display = 'block'; return; }
            if(!isListening) { recognition.start(); responsiveVoice.speak("Tui nghe!", "Vietnamese Female"); } 
            else { recognition.stop(); } 
        }
        function submitText() { const v = document.getElementById('text-input').value.trim(); if(v) { processInput(v); document.getElementById('text-input').value = ''; } }
        function goToWorkspace() { document.getElementById('landing-page').className = 'screen hidden'; document.getElementById('workspace-page').className = 'screen active'; }
        function updateMicUI(s) { document.getElementById('main-mic-btn').classList.toggle('mic-recording', s); document.getElementById('workspace-mic-btn').classList.toggle('mic-recording', s); }
        
        window.onload = initApp;
    </script>
</body>
</html>
