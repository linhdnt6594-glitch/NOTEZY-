<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V8 SUPER IMMORTAL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4200/4200052.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --work: #3B82F6; --pers: #EC4899;
            --bg: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #D4C4FB, #FFDEE9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: var(--bg); background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .screen {
            position: absolute; width: 100%; height: 100%;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;
        }
        .hidden { transform: translateY(100vh); opacity: 0; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Trang 1: Siêu Hologram */
        #landing { justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
        
        .logo-3d {
            font-size: 200px; cursor: pointer;
            animation: float 4s ease-in-out infinite, glow 2s ease-in-out infinite;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
            user-select: none;
        }

        @keyframes float { 0%, 100% {transform: translateY(0) scale(1);} 50% {transform: translateY(-30px) scale(1.05);} }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(236, 72, 153, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(181, 255, 252, 0.6)); }
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.4); padding: 10px 20px; border-radius: 30px;
            font-weight: 800; font-size: 14px; margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 10px; height: 10px; background: #ff4757; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

        /* Trang 2: Workspace */
        .tab-bar { display: flex; gap: 10px; margin: 20px 0; }
        .tab { 
            flex: 1; padding: 15px; border-radius: 20px; text-align: center; font-weight: 800;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); transition: 0.3s;
        }
        .active-work { background: var(--work) !important; color: white; }
        .active-pers { background: var(--pers) !important; color: white; }

        .note-list { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .card { 
            background: rgba(255,255,255,0.25); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 25px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.4); display: flex; align-items: center;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        /* Mic luôn sẵn sàng */
        .mic-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border-radius: 50%; background: white;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100;
        }
        .mic-active { background: #ff4757; color: white; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 20px rgba(255, 71, 87, 0);} 100% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);} }
    </style>
</head>
<body>

<div id="landing" class="screen active">
    <div class="logo-3d">📓</div>
    <div class="status-pill"><div class="dot"></div> ĐANG HÓNG CHUYỆN...</div>
    <p style="margin-top:20px; font-weight:600; color: #64748B;">Cứ nói đi, tui nghe hết!</p>
</div>

<div id="workspace" class="screen hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="font-weight:900; letter-spacing:-1px;">SỔ TAY PRO</h1>
        <span class="material-icons-round" onclick="location.reload()">refresh</span>
    </div>
    
    <div class="tab-bar">
        <div id="t-work" class="tab active-work" onclick="setTab('work')">CÔNG VIỆC</div>
        <div id="t-pers" class="tab" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>

    <div class="note-list" id="list"></div>
</div>

<div class="mic-fixed" id="master-mic">
    <span class="material-icons-round" style="font-size: 35px;">mic</span>
</div>

<script>
    const KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
    let currentTab = 'work';
    let notes = JSON.parse(localStorage.getItem('notezy_v8')) || [];
    let rec;
    let isActive = false;

    // 1. Tự khởi động Mic ngay khi mở
    function startListening() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new Speech();
        rec.lang = 'vi-VN';
        rec.continuous = true; // Luôn luôn nghe
        rec.interimResults = false;

        rec.onstart = () => { 
            isActive = true; 
            document.getElementById('master-mic').classList.add('mic-active');
        };
        rec.onresult = (e) => {
            const txt = e.results[e.results.length - 1][0].transcript;
            processAI(txt);
        };
        rec.onend = () => { rec.start(); }; // Tự động bật lại nếu bị ngắt
        rec.start();
    }

    async function processAI(txt) {
        // Tự chuyển sang trang 2 nếu đang ở trang 1
        document.getElementById('landing').className = 'screen hidden';
        document.getElementById('workspace').className = 'screen active';

        const prompt = `Bạn là trợ lý nữ miền Nam nanh nọc. Phân loại câu "${txt}" vào "work" hoặc "personal". Trả về JSON: {"type": "work/personal", "reply": "câu khịa", "item": "nội dung"}`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await res.json();
            const clean = d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "");
            const resAI = JSON.parse(clean);

            notes.push({ id: Date.now(), text: resAI.item, type: resAI.type });
            localStorage.setItem('notezy_v8', JSON.stringify(notes));
            responsiveVoice.speak(resAI.reply, "Vietnamese Female");
            setTab(resAI.type);
        } catch(e) {
            notes.push({ id: Date.now(), text: txt, type: currentTab });
            render();
        }
    }

    function setTab(t) {
        currentTab = t;
        document.getElementById('t-work').className = t === 'work' ? 'tab active-work' : 'tab';
        document.getElementById('t-pers').className = t === 'personal' ? 'tab active-pers' : 'tab';
        render();
    }

    function render() {
        const l = document.getElementById('list');
        l.innerHTML = '';
        notes.filter(n => n.type === currentTab).reverse().forEach(n => {
            l.innerHTML += `<div class="card">
                <div style="width:10px; height:10px; border-radius:50%; background:${n.type==='work'?'#3B82F6':'#EC4899'}; margin-right:15px;"></div>
                <span style="flex:1; font-weight:700;">${n.text}</span>
                <span class="material-icons-round" onclick="del(${n.id})" style="opacity:0.2">delete</span>
            </div>`;
        });
    }

    function del(id) {
        notes = notes.filter(n => n.id !== id);
        localStorage.setItem('notezy_v8', JSON.stringify(notes));
        render();
    }

    // Kích hoạt khi chạm lần đầu (Bắt buộc do bảo mật trình duyệt)
    window.onclick = () => {
        if(!isActive) {
            startListening();
            responsiveVoice.speak("Sẵn sàng nghe lệnh Chủ tịch!", "Vietnamese Female");
        }
    };

    window.onload = render;
</script>
</body>
</html>
