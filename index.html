<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V15 - REAL POWER</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --bg: #F1F5F9; 
            --work-theme: #805AD5; 
            --pers-theme: #D53F8C;
            --text-dark: #2D3748;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: #E2E8F0; color: var(--text-dark);
        }

        /* Nền loang Pastel Trầm */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #E9D5FF 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #FBCFE8 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #F1F5F9 0%, transparent 100%);
            z-index: -1;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; padding: 30px 25px; box-sizing: border-box;
        }
        .hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Trang 1: Cuốn sổ Hologram y hình mẫu */
        #landing { justify-content: center; align-items: center; text-align: center; }
        
        .hologram-book {
            width: 260px; height: 340px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 35px; border: 2px solid rgba(255,255,255,0.6);
            display: flex; justify-content: center; align-items: center;
            position: relative; animation: float 4s ease-in-out infinite;
            backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        .hologram-book::after {
            content: '📓'; font-size: 160px; filter: saturate(0.5) opacity(0.8);
        }

        @keyframes float { 0%, 100% {transform: translateY(0) rotate(0deg);} 50% {transform: translateY(-25px) rotate(3deg);} }

        /* Trang 2: Workspace */
        .tab-bar { display: flex; gap: 12px; margin-bottom: 25px; }
        .tab-btn {
            flex: 1; padding: 18px; border-radius: 20px; text-align: center;
            font-weight: 900; background: rgba(255,255,255,0.5); border: 2px solid transparent;
            transition: 0.3s; color: #718096;
        }
        .active-w { border-color: var(--work-theme); color: var(--work-theme); background: white; }
        .active-p { border-color: var(--pers-theme); color: var(--pers-theme); background: white; }

        .list-container { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .list-container::-webkit-scrollbar { display: none; }

        .note-card {
            background: white; padding: 22px; border-radius: 25px; margin-bottom: 15px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.8);
            animation: slideUp 0.5s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .note-card.done span { text-decoration: line-through; opacity: 0.4; }
        @keyframes slideUp { from {opacity:0; transform: translateY(20px);} to {opacity:1;} }

        /* Ô tích chuyên nghiệp */
        .check-box {
            width: 26px; height: 26px; border-radius: 8px; border: 3px solid #cbd5e0;
            margin-right: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .check-box.checked { border-color: #48BB78; background: #48BB78; }
        .check-box.checked::after { content: '✓'; color: white; font-weight: 900; font-size: 18px; }

        /* Mic & Nút thêm */
        .btn-group { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 20px; z-index: 100; }
        .btn-action { width: 85px; height: 85px; border-radius: 50%; background: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; }
        .mic-on { background: #ff4757 !important; color: white; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 25px rgba(255, 71, 87, 0);} }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div id="landing" class="screen active" onclick="switchPage('workspace')">
    <div class="hologram-book"></div>
    <p style="margin-top:40px; font-weight:900; color: #4A5568;">CHẠM ĐỂ MỞ SỔ<br>CHỦ TỊCH CÁ VÀNG!</p>
</div>

<div id="workspace" class="screen hidden">
    <h1 style="font-weight:900; letter-spacing:-1.5px; margin-bottom: 25px;">SỔ TAY CỦA CHỦ TỊCH</h1>
    <div class="tab-bar">
        <div id="t-w" class="tab-btn active-w" onclick="setTab('work')">CÔNG VIỆC</div>
        <div id="t-p" class="tab-btn" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>
    <div id="list" class="list-container"></div>
</div>

<div class="btn-group">
    <div class="btn-action" onclick="addManual()"><span class="material-icons-round" style="font-size: 35px;">add</span></div>
    <div class="btn-action" id="mic"><span class="material-icons-round" style="font-size: 45px;">mic</span></div>
</div>

<script>
    const KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng"; 
    let notes = JSON.parse(localStorage.getItem('notezy_v15')) || [];
    let currentTab = 'work';
    let rec, isListening = false;

    function startRec() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        rec = new Speech(); rec.lang = 'vi-VN'; rec.continuous = true;
        rec.onstart = () => { isListening = true; document.getElementById('mic').classList.add('mic-on'); };
        rec.onresult = (e) => { processAI(e.results[e.results.length - 1][0].transcript); };
        rec.onend = () => { if(isListening) rec.start(); };
        rec.start();
    }

    async function processAI(txt) {
        if(document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        const p = `Bạn là trợ lý nữ miền Nam nanh nọc. Chủ tịch bị não cá vàng. Phân loại "${txt}" vào "work" hoặc "personal". Trả về JSON: {"type": "work/personal", "reply": "câu khịa cá vàng nín thinh", "text": "nội dung"}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const d = await res.json();
            const resAI = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
            
            notes.unshift({ id: Date.now(), text: resAI.text, type: resAI.type, done: false });
            saveAndRender();
            responsiveVoice.speak(resAI.reply, "Vietnamese Female");
            setTab(resAI.type);
        } catch(e) { notes.unshift({ id: Date.now(), text: txt, type: currentTab, done: false }); saveAndRender(); }
    }

    function addManual() {
        const val = prompt("Chủ tịch muốn ghi tay gì?");
        if(val) {
            notes.unshift({ id: Date.now(), text: val, type: currentTab, done: false });
            saveAndRender();
            responsiveVoice.speak("Ghi tay cho chắc chứ tui hổng tin cái não cá vàng của cưng!", "Vietnamese Female");
        }
    }

    function toggleDone(id) {
        const n = notes.find(x => x.id === id);
        n.done = !n.done;
        if(n.done) responsiveVoice.speak("Ôi lạ chưa, cuối cùng cũng xong việc!", "Vietnamese Female");
        saveAndRender();
    }

    function saveAndRender() { localStorage.setItem('notezy_v15', JSON.stringify(notes)); render(); }

    function render() {
        const list = document.getElementById('list'); list.innerHTML = '';
        notes.filter(n => n.type === currentTab).forEach(n => {
            list.innerHTML += `<div class="note-card ${n.done?'done':''}">
                <div class="check-box ${n.done?'checked':''}" onclick="toggleDone(${n.id})"></div>
                <span style="flex:1; font-weight:900; font-size:1.1rem;">${n.text}</span>
                <span class="material-icons-round" onclick="del(${n.id})" style="opacity:0.2; cursor:pointer;">delete</span>
            </div>`;
        });
    }

    function del(id) { notes = notes.filter(n => n.id !== id); saveAndRender(); }
    function setTab(t) { currentTab = t; document.getElementById('t-w').className = t==='work'?'tab-btn active-w':'tab-btn'; document.getElementById('t-p').className = t==='personal'?'tab-btn active-p':'tab-btn'; render(); }
    function switchPage(p) { document.getElementById('landing').className='screen hidden'; document.getElementById('workspace').className='screen active'; render(); }

    window.onclick = () => { if(!isListening) { startRec(); responsiveVoice.speak("Hóng lệnh Chủ tịch!", "Vietnamese Female"); } };
    window.onload = render;
</script>
</body>
</html>
