<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V7 Ultra Professional</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4200/4200052.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --work-color: #3B82F6; /* Xanh Công việc */
            --personal-color: #EC4899; /* Hồng Cá nhân */
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #D4C4FB, #FFDEE9);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        /* Màn hình chuyển cảnh mượt */
        .screen {
            position: absolute; width: 100%; height: 100%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;
        }
        .hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .active { transform: translateX(0); opacity: 1; z-index: 10; }

        /* Trang 1: Landing Page */
        #landing { justify-content: space-between; align-items: center; padding: 60px 25px; }

        .logo-container {
            flex: 1; display: flex; justify-content: center; align-items: center; position: relative;
        }

        .floating-note {
            font-size: 180px; text-align: center;
            animation: float 4s ease-in-out infinite, hologram-glow 2s ease-in-out infinite;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1));
            cursor: pointer; position: relative;
        }

        /* Hiệu ứng trôi lững lờ */
        @keyframes float { 0%, 100% {transform: translateY(0) rotate(0deg);} 50% {transform: translateY(-25px) rotate(5deg);} }

        /* Hiệu ứng Hologram phát sáng */
        @keyframes hologram-glow {
            0%, 100% { text-shadow: 0 0 20px #FFDEE9, 0 0 30px #B5FFFC, 0 0 40px #D4C4FB; opacity: 0.9; }
            50% { text-shadow: 0 0 30px #FFDEE9, 0 0 40px #B5FFFC, 0 0 50px #D4C4FB; opacity: 1; }
        }

        .title-v7 {
            font-size: 2rem; font-weight: 800; letter-spacing: -1.5px;
            margin-bottom: 30px; text-align: center;
            background: linear-gradient(90deg, #FFDEE9, #B5FFFC, #D4C4FB);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Mic Button trang 1 */
        .mic-btn-main {
            width: 100px; height: 100px; border-radius: 50%;
            background: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer;
            border: 4px solid transparent; transition: 0.3s;
        }
        .recording { border-color: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 30px rgba(255, 71, 87, 0);} 100% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);} }

        /* Trang 2: Workspace Page */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h2 { margin: 0; font-weight: 800; letter-spacing: -1px; }

        /* Tabs phân loại */
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px; border-radius: 15px; text-align: center;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .tab.active-work { background: var(--work-color); color: white; }
        .tab.active-personal { background: var(--personal-color); color: white; }

        /* Danh sách Note */
        .note-list { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .note-list::-webkit-scrollbar { display: none; } /* Ẩn scrollbar */

        .note-card {
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
            border: 1px solid var(--glass-border); display: flex; align-items: center;
            animation: slideIn 0.3s ease-out; transition: transform 0.2s ease;
        }
        .note-card:active { transform: scale(0.98); } /* Hiệu ứng nhấn */
        @keyframes slideIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        /* Tag phân loại màu sắc */
        .tag { font-size: 10px; padding: 4px 10px; border-radius: 10px; color: white; margin-right: 12px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .tag-work { background: var(--work-color); }
        .tag-personal { background: var(--personal-color); }

        /* Khu vực nhập liệu */
        .input-area { position: fixed; bottom: 25px; left: 25px; right: 25px; display: flex; gap: 12px; }
        input { flex: 1; padding: 18px; border-radius: 20px; border: none; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.05); font-weight: 600; outline: none; }
        .btn-action { width: 56px; height: 56px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        /* Vòng xoay tải */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; color: white; flex-direction: column; z-index: 1000; display: none; }
        .loading-spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--work-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>

    </div>

    </div>
    <p style="font-weight: 600; opacity: 0.6;" onclick="switchPage('workspace')">Chạm để xem danh sách note</p>

<div id="workspace" class="screen hidden">
    <div class="header">
        <h2>Sổ Tay V7 Pro</h2>

    <div class="tab-container">
        <div class="tab active-work" id="tab-work" onclick="setTab('work')">CÔNG VIỆC</div>

        </div>

        "Note lẹ cưng ơi, tui còn đi 'sống ảo', đừng làm mất 'lai'!"
    ];

    let currentTab = 'work';
    let notes = JSON.parse(localStorage.getItem('notezy_v7')) || [];
    let recognition;
    let isRecording = false;

    // 1. Chào hỏi chanh chua khi mở App
    function sayGreeting() {
        if(notes.length === 0) {
            responsiveVoice.speak("Chào đại gia Khải, muốn note gì nói tui nghe", "Vietnamese Female");
        } else {
            const randomGreet = g[Math.floor(Math.random() * g.length)];
            responsiveVoice.speak(randomGreet, "Vietnamese Female");
        }
    }

    // 2. Kích hoạt Speech API
    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) { alert("Trình duyệt không hỗ trợ Mic!"); return; }
        
        recognition = new Speech();
        recognition.lang = 'vi-VN';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => { updateMicUI(true); };
        recognition.onend = () => { updateMicUI(false); };
        recognition.onresult = (e) => {
            processAI(e.results[0][0].transcript);
        };
    }

    // 3. Xử lý khi bấm Mic (Trang 1 và Trang 2)
    function handleMicClick() {
        if(!isRecording) {
            // Nếu đang ở trang 1, nhảy sang trang 2 mượt mà
            if(document.getElementById('landing').classList.contains('active')) {
                switchPage('workspace');
            }
            recognition.start();
        } else {
            recognition.stop();
        }
    }

    // Cập nhật giao diện Mic
    function updateMicUI(on) {
        isRecording = on;
        const m1 = document.getElementById('mic-1');
        const m2 = document.getElementById('mic-2');
        if(on) {
            m1.classList.add('recording'); m2.classList.add('recording');
        } else {
            m1.classList.remove('recording'); m2.classList.remove('recording');
        }
    }

    // 4. Chuyển đổi trang mượt
    function switchPage(p) {
        const l = document.getElementById('landing');
        const w = document.getElementById('workspace');
        if(p === 'workspace') {
            l.classList.replace('active', 'hidden');
            w.classList.replace('hidden', 'active');
        } else {
            w.classList.replace('active', 'hidden');
            l.classList.replace('hidden', 'active');
        }
    }

    function setTab(t) {
        currentTab = t;
        document.getElementById('tab-work').className = t === 'work' ? 'tab active-work' : 'tab';
        document.getElementById('tab-personal').className = t === 'personal' ? 'tab active-personal' : 'tab';
        render();
    }

    // 6. Xử lý tay
    function addText() {
        const input = document.getElementById('text-in');
        if(input.value.trim()) {
            processAI(input.value);
            input.value = '';
        }
    }

    // 💥 CHỊ TRỢ LÝ NANH NỌC V6 PRO 💥 (Phân loại tự động)
    async function processAI(txt) {
        document.getElementById('loading').style.display = 'flex';
        
        // System Prompt cực mạnh
        const sp = `Bạn là trợ lý nữ miền Nam nanh nọc, gọi 'cưng' xưng 'tui'. Trả về DUY NHẤT JSON: {"type": "work/personal", "reply": "câu khịa ngắn gọn", "item": "nội dung ngắn gọn"}`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    systemInstruction: { parts: [{ text: sp }] },
                    contents: [{ parts: [{ text: `Câu nói: "${txt}"` }] }]
                })
            });
            const d = await res.json();
            const raw = d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "");
            const resAI = JSON.parse(raw);

            // Lưu note
            notes.push({ id: Date.now(), text: resAI.item || txt, type: resAI.type || currentTab, done: false });
            localStorage.setItem('notezy_v7', JSON.stringify(notes));

            // TTS
            responsiveVoice.speak(resAI.reply, "Vietnamese Female");
            
            // Tự nhảy tab
            setTab(resAI.type);

        } catch(e) {
            console.error(e);
            // Fallback khi lỗi
            notes.push({ id: Date.now(), text: txt, type: currentTab, done: false });
            localStorage.setItem('notezy_v7', JSON.stringify(notes));
            responsiveVoice.speak("Ok tui ghi đại vô sổ rồi đó cưng!", "Vietnamese Female");
            render();
        }
        document.getElementById('loading').style.display = 'none';
    }

    // 7. Render danh sách
    function render() {
        const l = document.getElementById('list');
        l.innerHTML = '';
        notes.filter(n => n.type === currentTab).reverse().forEach(n => {
            const div = document.createElement('div');
            div.className = 'note-card';
            div.innerHTML = `
                <span class="tag ${n.type==='work'?'tag-work':'tag-personal'}">${n.type}</span>
                <span style="flex:1; font-weight:600;">${n.text}</span>
                <span class="material-icons-round" style="opacity:0.3; cursor:pointer;" onclick="delNote(${n.id})">delete</span>
            `;
            l.appendChild(div);
        });
    }

    // 8. Xóa note
    function delNote(id) {
        notes = notes.filter(n => n.id !== id);
        localStorage.setItem('notezy_v7', JSON.stringify(notes));
        render();
    }

    // BÙM
    window.onload = () => { initSpeech(); sayGreeting(); render(); };
</script>

</body>
</html>
