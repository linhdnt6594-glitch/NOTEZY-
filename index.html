<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V19 - CƯNG EDITION</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/t-orign/note-hologram/main/hologram-note.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            /* 🎨 BỘ MÀU MỚI: CLOUDY LAVENDER & SHADOW GRAY 🎨 */
            --bg-deep: #4A4E69; /* Xám xanh trầm lì */
            --accent-purple: #9A8C98; /* Tím khói */
            --accent-pink: #F2E9E4; /* Kem hồng nhạt */
            --accent-mic: #C9ADA7; /* Nâu trầm Pastel */
            --text-light: #F2E9E4;
            --card-glass: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: var(--bg-deep); color: var(--text-light);
        }

        /* Hiệu ứng nền mờ ảo sang trọng */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, #9A8C98 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, #C9ADA7 0%, transparent 40%);
            z-index: -1;
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; padding: 35px 25px; box-sizing: border-box;
        }
        .hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Trang 1: Landing */
        #landing { justify-content: center; align-items: center; text-align: center; }
        .hologram-book {
            width: 240px; height: 320px;
            background: var(--card-glass);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
            animation: float 4s ease-in-out infinite;
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .hologram-book::after { content: '📓'; font-size: 140px; filter: drop-shadow(0 0 15px var(--accent-mic)); }
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-25px);} }

        /* Trang 2: Workspace */
        .workspace-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 16px; border-radius: 20px; text-align: center;
            font-weight: 900; background: rgba(255,255,255,0.1); border: 2px solid transparent;
            transition: 0.3s; color: var(--accent-pink);
        }
        .active-w { border-color: var(--accent-purple); background: var(--card-glass); color: white; }
        .active-p { border-color: var(--accent-mic); background: var(--card-glass); color: white; }

        .list-wrap { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .list-wrap::-webkit-scrollbar { display: none; }

        .card {
            background: var(--card-glass); padding: 22px; border-radius: 25px; margin-bottom: 15px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            animation: slideIn 0.5s ease-out; backdrop-filter: blur(10px);
        }
        .card.done span { text-decoration: line-through; opacity: 0.4; }
        @keyframes slideIn { from {opacity: 0; transform: translateY(20px);} }

        /* Checkbox */
        .check-box {
            width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--accent-pink);
            margin-right: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .check-box.checked { background: var(--accent-purple); border-color: var(--accent-purple); }
        .check-box.checked::after { content: '✓'; color: white; font-weight: 900; }

        /* Buttons */
        .btn-group { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        .btn-action { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-pink); display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; color: var(--bg-deep); }
        .mic-on { background: #ff4d4d !important; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4);} 70% {box-shadow: 0 0 0 25px rgba(255, 77, 77, 0);} }

        /* Modal */
        #inputModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg-deep); padding: 30px; border-radius: 30px; width: 85%; border: 1px solid var(--accent-purple); }
        .modal-content input { width: 100%; padding: 15px; border-radius: 15px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; margin-bottom: 20px; box-sizing: border-box; }
        .modal-content button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--accent-purple); color: white; font-weight: 900; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div id="landing" class="screen active" onclick="switchPage('workspace')">
    <div class="hologram-book"></div>
    <p style="margin-top:40px; font-weight:900; color: var(--accent-pink);">BẤM ĐỂ MỞ SỔ<br>ĐI CƯNG ƠI!</p>
</div>

<div id="workspace" class="screen hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h1 class="workspace-title">Não lag? Mở Notezy 😎</h1>
        <span class="material-icons-round" style="cursor:pointer;" onclick="location.reload()">refresh</span>
    </div>
    
    <div class="tab-bar">
        <div id="t-w" class="tab-btn active-w" onclick="setTab('work')">CÔNG VIỆC</div>
        <div id="t-p" class="tab-btn" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>
    <div id="list" class="list-wrap"></div>
</div>

<div class="btn-group">
    <div class="btn-action" onclick="openModal()"><span class="material-icons-round" style="font-size: 35px;">add</span></div>
    <div class="btn-action" id="mic"><span class="material-icons-round" style="font-size: 40px;">mic</span></div>
</div>

<div id="inputModal">
    <div class="modal-content">
        <h3 style="margin-top:0">Ghi tay đi cưng</h3>
        <input type="text" id="manualInput" placeholder="Nhập nhanh...">
        <button onclick="addManual()">LƯU LẠI</button>
        <button style="background:transparent; color:var(--accent-pink);" onclick="closeModal()">HUỶ</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
    let notes = JSON.parse(localStorage.getItem('notezy_v19')) || [];
    let currentTab = 'work';
    let rec, isListening = false;

    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new Speech(); rec.lang = 'vi-VN'; rec.continuous = true;
        rec.onstart = () => { isListening = true; document.getElementById('mic').classList.add('mic-on'); };
        rec.onresult = (e) => { processAI(e.results[e.results.length - 1][0].transcript); };
        rec.onend = () => { if(isListening) rec.start(); };
        rec.start();
    }

    async function processAI(txt) {
        if(document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        const p = `Bạn là trợ lý nữ miền Nam nanh nọc. Phân loại câu "${txt}" vào "work" hoặc "personal". Trả về JSON: {"type": "work/personal", "reply": "câu khía hài hước gọi đối phương là cưng", "text": "nội dung"}`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const d = await res.json();
            const resAI = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
            notes.unshift({ id: Date.now(), text: resAI.text, type: resAI.type, done: false });
            save();
            responsiveVoice.speak(resAI.reply, "Vietnamese Female");
            setTab(resAI.type);
        } catch(e) { notes.unshift({ id: Date.now(), text: txt, type: currentTab, done: false }); save(); }
    }

    function addManual() {
        const val = document.getElementById('manualInput').value;
        if(val) {
            notes.unshift({ id: Date.now(), text: val, type: currentTab, done: false });
            save();
            responsiveVoice.speak("Ghi tay rồi nhen cưng!", "Vietnamese Female");
            document.getElementById('manualInput').value = '';
            closeModal();
        }
    }

    function toggleDone(id) {
        const n = notes.find(x => x.id === id);
        n.done = !n.done;
        if(n.done) responsiveVoice.speak("Xong rồi hả cưng? Giỏi quá ta!", "Vietnamese Female");
        save();
    }

    function save() { localStorage.setItem('notezy_v19', JSON.stringify(notes)); render(); }
    function render() {
        const l = document.getElementById('list'); l.innerHTML = '';
        notes.filter(n => n.type === currentTab).forEach(n => {
            l.innerHTML += `<div class="card ${n.done?'done':''}">
                <div class="check-box ${n.done?'checked':''}" onclick="toggleDone(${n.id})"></div>
                <span style="flex:1; font-weight:600;">${n.text}</span>
                <span class="material-icons-round" style="opacity:0.3" onclick="del(${n.id})">delete</span>
            </div>`;
        });
    }

    function del(id) { notes = notes.filter(n => n.id !== id); save(); }
    function setTab(t) { currentTab = t; document.getElementById('t-w').className = t==='work'?'tab-btn active-w':'tab-btn'; document.getElementById('t-p').className = t==='personal'?'tab-btn active-p':'tab-btn'; render(); }
    function switchPage(p) { document.getElementById('landing').className='screen hidden'; document.getElementById('workspace').className='screen active'; render(); }
    function openModal() { document.getElementById('inputModal').style.display='flex'; }
    function closeModal() { document.getElementById('inputModal').style.display='none'; }

    window.onclick = () => { if(!isListening) { initSpeech(); responsiveVoice.speak("Sổ tay của cưng sẵn sàng!", "Vietnamese Female"); } };
    window.onload = render;
</script>
</body>
</html>
