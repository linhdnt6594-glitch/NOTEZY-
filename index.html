<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOTEZY V17 - SUPREME SLOGAN</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/t-orign/note-hologram/main/hologram-note.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            /* 💥 BỘ MÀU ROYAL PASTEL CHUẨN ĐÃ DUYỆT 💥 */
            --bg-stone: #D8D8D8; /* Màu Xám Đá trầm lì */
            --bg-royal-card: rgba(0, 0, 0, 0.05); /* Thẻ trắng loang nhẹ */
            --accent-lavender: #E0CFFC; /* Tím Lavender */
            --accent-blush: #F8E0F2; /* Hồng Blush */
            --accent-mic: #B794F4; /* Tím Mic đậm */
            --text-main: #2D3748;
            --text-sub: #718096;
            --card-white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: var(--bg-stone); color: var(--text-main);
        }

        /* Nền loang dịu chuẩn Pastel */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, var(--accent-lavender) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, var(--accent-blush) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #F1F5F9 0%, transparent 100%);
            z-index: -1; animation: drift 20s infinite alternate;
        }
        @keyframes drift { from {transform: scale(1);} to {transform: scale(1.1);} }

        .screen {
            position: absolute; width: 100%; height: 100%;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; padding: 30px 25px; box-sizing: border-box;
        }
        .hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Trang 1: Landing - Cuốn sổ SIÊU TO 3D Hologram */
        #landing { justify-content: space-between; align-items: center; padding: 60px 25px; text-align: center; }

        .logo-container { flex: 1; display:flex; justify-content:center; align-items:center; }
        .hologram-book {
            width: 250px; height: 350px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 35px; border: 2px solid rgba(255,255,255,0.6);
            display: flex; justify-content: center; align-items: center;
            position: relative; animation: float 5s ease-in-out infinite, hologramLoang 10s linear infinite;
            backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            cursor: pointer;
        }
        /* Hình ảnh cuốn sổ loang màu y trang hình chủ tịch gửi */
        .hologram-book::after { content: '📓'; font-size: 160px; filter: saturate(0.5) opacity(0.8); }

        @keyframes float { 0%, 100% {transform: translateY(0) rotate(0deg);} 50% {transform: translateY(-30px) rotate(3deg);} }
        @keyframes hologramLoang { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .status-pill {
            margin-top: 50px; background: white;
            padding: 12px 28px; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 800; color: var(--text-sub);
        }
        .dot { width: 12px; height: 12px; background: var(--accent-mic); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

        /* Trang 2: Workspace - Phân loại thông minh */
        .workspace-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; color: var(--text-main); }
        
        .tab-bar { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 18px; border-radius: 20px; text-align: center;
            font-weight: 900; background: rgba(255,255,255,0.5); border: 2px solid transparent;
            transition: 0.3s; color: var(--text-sub); backdrop-filter: blur(5px);
        }
        .active-w { border-color: var(--accent-mic); color: var(--accent-mic); background: white; box-shadow: 0 10px 20px rgba(183, 148, 244, 0.1); }
        .active-p { border-color: var(--accent-blush); color: var(--accent-blush); background: white; box-shadow: 0 10px 20px rgba(246, 135, 179, 0.1); }

        .list-wrap { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .list-wrap::-webkit-scrollbar { display: none; }

        .note-card {
            background: var(--card-white); padding: 22px; border-radius: 25px; margin-bottom: 15px;
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.8);
            animation: slideUp 0.5s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: 0.3s ease;
        }
        .note-card.done span { text-decoration: line-through; opacity: 0.4; color: var(--text-sub) !important; }
        @keyframes slideUp { from {opacity:0; transform: translateY(20px);} to {opacity:1;} }

        /* Ô tíchCheckbox chuẩn Royal */
        .check-box {
            width: 26px; height: 26px; border-radius: 8px; border: 3px solid #cbd5e0;
            margin-right: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .check-box.checked { border-color: #48BB78; background: #48BB78; }
        .check-box.checked::after { content: '✓'; color: white; font-weight: 900; font-size: 18px; }

        /* Mic Button xịn */
        .mic-wrap { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .mic-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: white; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
        }
        .mic-recording { background: #ff4757; color: white; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 25px rgba(255, 71, 87, 0);} 100% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);} }
        
        /* Modal thêm Note tay */
        #inputModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 85%; display: flex; flex-direction: column; gap: 15px; }
        .modal-content input { padding: 18px; border-radius: 18px; border: 2px solid #eee; font-size: 16px; font-family: inherit; outline: none; }
        .modal-content button { padding: 18px; border-radius: 18px; border: none; background: var(--accent-mic); color: white; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div id="landing" class="screen active" onclick="sayGreeting()">
    <div class="logo-container">
        <div class="hologram-book" onclick="switchPage('workspace')"></div>
    </div>
    <div class="status-pill"><div class="dot"></div> ĐANG ĐỢI CHỦ TỊCH CÁ VÀNG...</div>
    <p style="margin-top:25px; font-weight:900; color: #4A5568;">BẤM ĐỂ MỞ SỔ<br>CHỦ TỊCH CÁ VÀNG!</p>
</div>

<div id="workspace" class="screen hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h1 class="workspace-title">Não lag? Mở Notezy 😎</h1>
        <span class="material-icons-round" style="cursor:pointer; color: var(--accent-mic); font-size: 35px;" onclick="location.reload()">refresh</span>
    </div>
    
    <div class="tab-bar">
        <div id="t-w" class="tab-btn active-w" onclick="setTab('work')">CÔNG VIỆC</div>
        <div id="t-p" class="tab-btn" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>
    <div id="list" class="list-wrap"></div>
</div>

<div class="mic-wrap" id="master-mic-wrap">
    <div style="display: flex; gap: 20px;">
        <div class="mic-btn" onclick="openModal()"><span class="material-icons-round" style="font-size: 40px; color: var(--text-dark);">add</span></div>
        <div class="mic-btn" id="master-mic"><span class="material-icons-round" style="font-size: 45px; color: var(--text-dark);">mic</span></div>
    </div>
</div>

<div id="inputModal">
    <div class="modal-content">
        <h3 style="margin:0; font-weight:900;">Thêm Note Thủ Công</h3>
        <input type="text" id="manualInput" placeholder="Chủ tịch muốn ghi gì...">
        <button onclick="addManual()">LƯU LẠI</button>
        <button style="background:#eee; color:#666;" onclick="closeModal()">HUỶ</button>
    </div>
</div>

<script>
    const AI_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng"; // Key của cưng
    let notes = JSON.parse(localStorage.getItem('notezy_v16')) || [];
    let currentTab = 'work';
    let rec, isListening = false;

    // Kho 100 câu chào chanh chua nanh nọc
    const greets = [
        "Hi cưng, tui chờ mòn mỏi, note gì nói lẹ coi!", "Vô note hay vô ngắm tui vậy đồ cá vàng?", "Mặt lấm lét chắc note chuyện xấu hả cưng?", "Cưng ơi, note lẹ tui còn đi ăn chè nữa.", "Nhìn cưng sành điệu đó, note chuyện gì sang chảnh coi!", "Note lẹ nhen cưng, tui còn đi shopping nữa.", "Nhìn mặt là biết sắp ngáo rồi đó, note gì nói lẹ!", "Chờ cưng mòn mỏi, note giùm cái đi đồ cá vàng!", "Note chuyện gì vui vui coi, buồn ngủ quá cưng ơi.", "Lại note chuyện bao đồng hả đồ rảnh rang!"
    ];

    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        rec = new Speech(); rec.lang = 'vi-VN'; rec.continuous = true;
        rec.onstart = () => { isListening = true; document.getElementById('master-mic').classList.add('mic-recording'); };
        rec.onresult = (e) => { processAI(e.results[e.results.length - 1][0].transcript); };
        rec.onend = () => { if(isListening) rec.start(); };
        rec.start();
    }

    async function processAI(txt) {
        if(document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        
        const p = `Bạn là trợ lý nữ miền Nam nanh nọc. Phân loại câu "${txt}" vào "work" hoặc "personal". Trả về JSON: {"type": "work/personal", "reply": "1 câu khịa hài hước cá vàng nín thinh", "text": "nội dung"}`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const d = await res.json();
            const clean = d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "");
            const resAI = JSON.parse(clean);
            
            notes.unshift({ id: Date.now(), text: resAI.text, type: resAI.type, done: false });
            saveAndRender();
            responsiveVoice.speak(resAI.reply, "Vietnamese Female");
            setTab(resAI.type);
        } catch(e) { notes.unshift({ id: Date.now(), text: txt, type: currentTab, done: false }); saveAndRender(); }
    }

    function addManual() {
        const txt = document.getElementById('manualInput').value;
        if(txt) {
            notes.unshift({ id: Date.now(), text: txt, type: currentTab, done: false });
            saveAndRender();
            responsiveVoice.speak("Ok tui ghi tay cái này rồi nhen đồ cá vàng!", "Vietnamese Female");
            document.getElementById('manualInput').value = '';
            closeModal();
        }
    }

    function toggleDone(id) {
        const n = notes.find(x => x.id === id);
        n.done = !n.done;
        if(n.done) responsiveVoice.speak("Nay nết lạ vậy, cũng biết làm xong việc hả?", "Vietnamese Female");
        saveAndRender();
    }

    function render() {
        const list = document.getElementById('list'); list.innerHTML = '';
        notes.filter(n => n.type === currentTab).forEach(n => {
            list.innerHTML += `<div class="card ${n.done?'done':''}">
                <div class="check-box ${n.done?'checked':''}" onclick="toggleDone(${n.id})"></div>
                <span style="flex:1; font-weight:900; font-size:1.1rem; color: var(--text-dark);">${n.text}</span>
                <span class="material-icons-round" onclick="delNote(${n.id})" style="opacity:0.2; cursor:pointer;">delete</span>
            </div>`;
        });
    }

    function sayGreeting() {
        const rGreet = greets[Math.floor(Math.random() * greets.length)];
        responsiveVoice.speak(rGreet, "Vietnamese Female");
    }

    function delNote(id) { notes = notes.filter(n => n.id !== id); saveAndRender(); }
    function saveAndRender() { localStorage.setItem('notezy_v16', JSON.stringify(notes)); render(); }
    function setTab(t) { currentTab = t; document.getElementById('t-w').className = t==='work'?'tab-btn active-w':'tab-btn'; document.getElementById('t-p').className = t==='personal'?'tab-btn active-p':'tab-btn'; render(); document.getElementById('list').scrollTop = 0; }
    function switchPage(p) { document.getElementById('landing').className='screen hidden'; document.getElementById('workspace').className='screen active'; render(); }
    function openModal() { document.getElementById('inputModal').style.display='flex'; document.getElementById('manualInput').focus(); }
    function closeModal() { document.getElementById('inputModal').style.display='none'; }

    window.onclick = () => { if(!isListening) { startRec(); responsiveVoice.speak("Sổ tay Supreme hóng lệnh!", "Vietnamese Female"); } };
    window.onload = render;
</script>
</body>
</html>
