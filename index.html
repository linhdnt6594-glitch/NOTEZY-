<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HoloNotes V6 Pro Immortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.2); --glass-border: rgba(255, 255, 255, 0.5); --text-dark: #1E293B; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; height: 100dvh; width: 100%; overflow: hidden; color: var(--text-dark); background: linear-gradient(-45deg, #FFDEE9, #B5FFFC, #D4C4FB, #FFDEE9); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 32px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }
        .screen { position: absolute; inset: 0; transition: opacity 0.5s ease, transform 0.5s ease; display: flex; flex-direction: column; box-sizing: border-box; padding: 25px; }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
        .active { opacity: 1; pointer-events: auto; transform: translateY(0); z-index: 10; }

        /* Trang 1 */
        #landing-page { justify-content: center; align-items: center; text-align: center; }
        .book-3d { font-size: 140px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); animation: float 3s ease-in-out infinite; cursor: pointer; margin-bottom: 30px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* Trang 2 */
        header h1 { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .note-list { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .note-list::-webkit-scrollbar { display: none; }
        .note-card { padding: 20px; margin-bottom: 16px; display: flex; align-items: center; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } }
        .note-card.done { opacity: 0.5; }
        .note-card.done .content { text-decoration: line-through; }

        .checkbox { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--text-dark); margin-right: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .checked { background: var(--text-dark); }
        .checked::after { content: '✓'; color: white; font-weight: bold; }

        /* Dock Căn Giữa */
        .dock-pill { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; z-index: 100; }
        .dock-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
        .btn-mic.recording { background: #f43f5e !important; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(244, 63, 94, 0); } }

        /* Modal */
        #inputModal { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { width: 85%; max-width: 400px; padding: 30px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: none; outline: none; font-size: 16px; font-weight: 600; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="landing-page" class="screen active" onclick="goToWorkspace()">
        <div class="book-3d">📓</div>
        <h1 style="font-weight:800; font-size: 1.8rem;">Não lag? Mở Notezy 😎</h1>
        <p style="opacity: 0.6; font-weight: 600;">Chạm để bắt đầu nà cưng!</p>
    </div>

    <div id="workspace-page" class="screen hidden">
        <header>
            <h1>HoloNotes</h1>
            <p id="current-date">Hôm nay</p>
        </header>
        <div class="note-list" id="note-container"></div>
    </div>

    <div class="dock-pill">
        <div class="glass dock-btn" onclick="showModal()"><span class="material-icons-round">add</span></div>
        <div class="glass dock-btn btn-mic" id="main-mic" onclick="startVoice()"><span class="material-icons-round">mic</span></div>
    </div>

    <div id="inputModal" onclick="if(event.target==this) hideModal()">
        <div class="glass modal-box">
            <h3 style="margin:0 0 15px; font-weight:800;">Note gì nà?</h3>
            <input type="text" id="manual-input" placeholder="Nhập việc cần làm..." onkeyup="if(event.key==='Enter') submitManual()">
            <button onclick="submitManual()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--text-dark); color:white; font-weight:800;">LƯU LẠI</button>
        </div>
    </div>

    <script>
        const AI_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
        let notes = JSON.parse(localStorage.getItem('holonotes_pro')) || [];
        let isListening = false, recognition;

        function initApp() {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long' });
            renderNotes();
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                recognition = new Speech(); recognition.lang = 'vi-VN';
                recognition.onstart = () => { isListening = true; document.getElementById('main-mic').classList.add('recording'); };
                recognition.onend = () => { isListening = false; document.getElementById('main-mic').classList.remove('recording'); };
                recognition.onresult = (e) => processInput(e.results[0][0].transcript);
            }
        }

        function startVoice() { if(!isListening) { recognition.start(); responsiveVoice.speak("Tui hóng nà cưng!", "Vietnamese Female"); } else { recognition.stop(); } }

        async function processInput(txt) {
            goToWorkspace();
            let rawTxt = txt.toLowerCase();
            const isDone = /\bxong\b/.test(rawTxt);
            let cleanTxt = txt.replace(/\bxong\b/gi, "").trim();

            if (!cleanTxt) return;

            // Kiểm tra tích xanh ngay tại chỗ nếu có chữ "Xong"
            if (isDone) {
                let found = false;
                for (let n of notes) {
                    if (!n.is_done && cleanTxt.length > 2 && n.item.toLowerCase().includes(cleanTxt.toLowerCase())) {
                        n.is_done = true; found = true;
                        responsiveVoice.speak("Xong rồi hả? Giỏi ta!", "Vietnamese Female");
                        break;
                    }
                }
                if (found) { save(); return; }
            }

            // Gọi AI phân loại
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Trả về JSON: {"reply": "câu khịa gọi cưng", "item": "${cleanTxt}"}` }] }] })
                });
                const d = await res.json();
                const ai = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
                notes.unshift({ id: Date.now(), item: ai.item, is_done: isDone });
                save();
                responsiveVoice.speak(isDone ? "Làm xong rồi hả?" : ai.reply, "Vietnamese Female");
            } catch (e) {
                notes.unshift({ id: Date.now(), item: cleanTxt, is_done: isDone });
                save();
            }
        }

        function renderNotes() {
            const container = document.getElementById('note-container');
            container.innerHTML = '';
            notes.forEach((n, i) => {
                const card = document.createElement('div');
                card.className = `glass note-card ${n.is_done ? 'done' : ''}`;
                card.innerHTML = `
                    <div class="checkbox ${n.is_done ? 'checked' : ''}" onclick="toggleDone(${i})"></div>
                    <div style="flex:1"><p class="content" style="margin:0; font-weight:600;">${n.item}</p></div>
                    <span class="material-icons-round" style="opacity:0.3" onclick="del(${i})">delete</span>
                `;
                container.appendChild(card);
            });
        }

        function toggleDone(i) { notes[i].is_done = !notes[i].is_done; save(); if(notes[i].is_done) responsiveVoice.speak("Tuyệt vời nà cưng!", "Vietnamese Female"); }
        function del(i) { notes.splice(i, 1); save(); }
        function save() { localStorage.setItem('holonotes_pro', JSON.stringify(notes)); renderNotes(); }
        function showModal() { document.getElementById('inputModal').style.display='flex'; document.getElementById('manual-input').focus(); }
        function hideModal() { document.getElementById('inputModal').style.display='none'; }
        function submitManual() { const v = document.getElementById('manual-input').value; if(v) { processInput(v); hideModal(); document.getElementById('manual-input').value=''; } }
        function goToWorkspace() { document.getElementById('landing-page').className='screen hidden'; document.getElementById('workspace-page').className='screen active'; }
        
        window.onload = initApp;
    </script>
</body>
</html>
