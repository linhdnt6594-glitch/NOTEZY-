<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notezy V10 - Voice Command</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root { --bg: #F8FAFC; --theme: #B794F4; --text: #1E293B; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; font-family: 'Inter', sans-serif; overflow: hidden; background: var(--bg); color: var(--text); }

        .screen { position: absolute; width: 100%; height: 100%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 30px 25px; box-sizing: border-box; }
        .hidden { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .active { transform: translateX(0); opacity: 1; z-index: 10; }

        /* Cuốn sổ V10 */
        .book-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .v10-book { font-size: 140px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); animation: swing 3s infinite ease-in-out; cursor: pointer; }
        @keyframes swing { 0%, 100% {transform: rotate(-5deg) translateY(0);} 50% {transform: rotate(5deg) translateY(-20px);} }

        /* Giao diện chính */
        .header { margin-bottom: 25px; }
        .tab-group { display: flex; gap: 10px; margin-bottom: 20px; background: #E2E8F0; padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; color: #64748B; }
        .tab.active-tab { background: white; color: var(--theme); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .list { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .note-card { background: white; padding: 20px; border-radius: 22px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
        .note-card.done span { text-decoration: line-through; opacity: 0.3; }

        /* Mic "Quyền Lực" */
        .mic-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; background: var(--theme); color: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(183, 148, 244, 0.5); z-index: 100; cursor: pointer; }
        .mic-btn.active { background: #FF4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 20px rgba(255, 71, 87, 0);} }
    </style>
</head>
<body>

<div id="landing" class="screen active">
    <div class="book-container" onclick="switchPage('workspace')">
        <div class="v10-book">📓</div>
        <h2 style="font-weight: 900; margin-top: 20px;">CHẠM ĐỂ MỞ SỔ NÀ CƯNG!</h2>
        <p style="color: #94A3B8; font-weight: 600;">Ra lệnh: "Mở công việc", "Xóa hết"...</p>
    </div>
</div>

<div id="workspace" class="screen hidden">
    <div class="header">
        <h1 style="font-weight: 900; letter-spacing: -1.5px; margin: 0;">Não lag? Mở Notezy 😎</h1>
    </div>
    <div class="tab-group">
        <div id="tab-work" class="tab active-tab" onclick="setTab('work')">WORK</div>
        <div id="tab-personal" class="tab" onclick="setTab('personal')">PERSONAL</div>
    </div>
    <div id="list" class="list"></div>
</div>

<div class="mic-btn" id="main-mic" onclick="toggleVoice()">
    <span class="material-icons-round" style="font-size: 35px;">mic</span>
</div>

<script>
    const API_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
    let notes = JSON.parse(localStorage.getItem('notezy_v10')) || [];
    let currentTab = 'work', rec, isListening = false;

    function toggleVoice() {
        if (!isListening) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            rec = new Speech(); rec.lang = 'vi-VN'; rec.continuous = false;
            rec.onstart = () => { isListening = true; document.getElementById('main-mic').classList.add('active'); };
            rec.onresult = (e) => { handleVoiceCommand(e.results[0][0].transcript); };
            rec.onend = () => { isListening = false; document.getElementById('main-mic').classList.remove('active'); };
            rec.start();
            responsiveVoice.speak("Tui nghe nà cưng!", "Vietnamese Female");
        } else {
            rec.stop();
        }
    }

    async function handleVoiceCommand(txt) {
        const cmd = txt.toLowerCase();
        
        // Lệnh điều khiển hệ thống
        if (cmd.includes("công việc") || cmd.includes("work")) { setTab('work'); switchPage('workspace'); return; }
        if (cmd.includes("cá nhân") || cmd.includes("personal")) { setTab('personal'); switchPage('workspace'); return; }
        if (cmd.includes("xóa hết") || cmd.includes("dọn dẹp")) { notes = notes.filter(n => n.type !== currentTab); save(); responsiveVoice.speak("Sạch bong kin kít rồi nà cưng!", "Vietnamese Female"); return; }
        if (cmd.includes("trang chủ") || cmd.includes("quay lại")) { document.getElementById('workspace').className='screen hidden'; document.getElementById('landing').className='screen active'; return; }

        // Nếu không phải lệnh, thì là Ghi chú
        if (document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        const isDone = /xong|đã|rồi/.test(cmd);
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Phân loại "${txt}" vào "work" hoặc "personal". Trả về JSON: {"type": "work/personal", "reply": "câu khịa gọi cưng", "text": "nội dung"}` }] }] })
            });
            const d = await res.json();
            const resAI = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
            notes.unshift({ id: Date.now(), text: resAI.text.replace(/xong|đã|rồi/gi, "").trim(), type: resAI.type, done: isDone });
            save();
            responsiveVoice.speak(isDone ? "Xong rồi hả cưng? Giỏi ta!" : resAI.reply, "Vietnamese Female");
            setTab(resAI.type);
        } catch(e) {
            notes.unshift({ id: Date.now(), text: txt, type: currentTab, done: isDone });
            save();
        }
    }

    function save() { localStorage.setItem('notezy_v10', JSON.stringify(notes)); render(); }
    function render() {
        const container = document.getElementById('list'); container.innerHTML = '';
        notes.filter(n => n.type === currentTab).forEach(n => {
            container.innerHTML += `<div class="note-card ${n.done?'done':''}">
                <div onclick="toggleDone(${n.id})" style="width:22px; height:22px; border:2px solid #CBD5E0; border-radius:6px; margin-right:15px; display:flex; align-items:center; justify-content:center; background:${n.done?'#4ADE80':'white'}; border-color:${n.done?'#4ADE80':'#CBD5E0'}">
                    ${n.done?'<span style="color:white; font-weight:900; font-size:12px;">✓</span>':''}
                </div>
                <span style="flex:1; font-weight:800;">${n.text}</span>
                <span class="material-icons-round" onclick="del(${n.id})" style="opacity:0.2; font-size:20px;">delete</span>
            </div>`;
        });
    }

    function toggleDone(id) { const n = notes.find(x => x.id === id); n.done = !n.done; save(); }
    function del(id) { notes = notes.filter(n => n.id !== id); save(); }
    function setTab(t) { currentTab = t; document.getElementById('tab-work').className = t==='work'?'tab active-tab':'tab'; document.getElementById('tab-personal').className = t==='personal'?'tab active-tab':'tab'; render(); }
    function switchPage(p) { document.getElementById('landing').className='screen hidden'; document.getElementById('workspace').className='screen active'; render(); }
    window.onload = render;
</script>
</body>
</html>
