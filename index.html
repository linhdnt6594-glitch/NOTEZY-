<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Notezy V4 - Clean Complete</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root { --bg-stone: #D8D8D8; --lavender: #E0CFFC; --blush: #F8E0F2; --deep-lavender: #B794F4; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; font-family: 'Inter', sans-serif; overflow: hidden; background: var(--bg-stone); }
        .bg-overlay { position: fixed; inset: 0; background: radial-gradient(circle at 10% 10%, var(--lavender) 0%, transparent 45%), radial-gradient(circle at 90% 90%, var(--blush) 0%, transparent 45%); z-index: -1; }

        .screen { position: absolute; width: 100%; height: 100dvh; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); display: flex; flex-direction: column; padding: 20px 25px; box-sizing: border-box; align-items: center; }
        .hidden { transform: translateY(100%); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Trang 1 */
        #landing { justify-content: center; }
        .book-frame { width: 260px; height: 340px; background: white; border-radius: 45px; display: flex; justify-content: center; align-items: center; box-shadow: 0 25px 50px rgba(0,0,0,0.08); animation: float 4s infinite; border: 1px solid rgba(255,255,255,0.8); cursor: pointer; }
        .book-icon { font-size: 150px; filter: drop-shadow(0 0 10px var(--lavender)); }
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-20px);} }

        /* Trang 2 */
        .list-wrap { width: 100%; flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .card { background: white; padding: 22px; border-radius: 28px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); animation: slide 0.3s; border-left: 6px solid #CBD5E0; }
        .card.done span { text-decoration: line-through; opacity: 0.3; }
        .check-box { width: 28px; height: 28px; border-radius: 10px; border: 3px solid #EDF2F7; margin-right: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; flex-shrink: 0; }
        .check-box.checked { background: #4ADE80; border-color: #4ADE80; }
        .check-box.checked::after { content: '✓'; color: white; font-weight: 900; }

        /* Dock */
        .dock-pill { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid white; z-index: 100; }
        .dock-item { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 35px; font-weight: 900; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-mic.on { background: #ff4d4d; color: white !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* Modal */
        #inputModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); }
        .modal-box { background: white; padding: 30px; border-radius: 40px; width: 85%; max-width: 400px; }
        input { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #EDF2F7; outline: none; margin-bottom: 20px; font-size: 16px; font-weight: 600; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="bg-overlay"></div>

<div id="landing" class="screen active" onclick="switchPage('workspace')">
    <div style="position: absolute; top: 60px; left: 30px;"><h1 style="font-weight: 900; margin: 0; font-size: 1.6rem;">NOTEZY</h1><p style="color: #718096; font-weight: 600; font-size: 11px;">The Unforgettable</p></div>
    <div class="book-frame"><div class="book-icon">📓</div></div>
    <h2 style="font-weight:900; margin-top:40px;">MỞ SỔ ĐI CƯNG!</h2>
</div>

<div id="workspace" class="screen hidden">
    <h1 style="font-weight:900; width:100%; margin-bottom:20px; font-size: 1.6rem;">Não lag? Mở Notezy 😎</h1>
    <div id="list" class="list-wrap"></div>
</div>

<div class="dock-pill">
    <div class="dock-item" onclick="showModal()" style="color:#718096;"><span class="material-icons-round">edit</span> ADD</div>
    <div class="dock-item btn-mic" id="mic-btn" onclick="startSpeech()" style="color:var(--deep-lavender);"><span class="material-icons-round">mic</span> SPEECH</div>
</div>

<div id="inputModal" onclick="if(event.target == this) closeModal()">
    <div class="modal-box">
        <h3 style="margin:0 0 20px; font-weight:900;">Ghi chú nà cưng</h3>
        <input type="text" id="manualInput" placeholder="Nhập note nhen..." onkeyup="if(event.key==='Enter') addManual()">
        <button onclick="addManual()" style="width:100%; padding:18px; border-radius:18px; border:none; background:var(--deep-lavender); color:white; font-weight:900;">LƯU LẠI</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
    let notes = JSON.parse(localStorage.getItem('notezy_v41')) || [];

    function startSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        const rec = new Speech(); rec.lang = 'vi-VN';
        rec.onstart = () => { document.getElementById('mic-btn').classList.add('on'); };
        rec.onresult = (e) => { processAI(e.results[0][0].transcript); };
        rec.onend = () => { document.getElementById('mic-btn').classList.remove('on'); };
        rec.start();
        responsiveVoice.speak("Tui hóng nà cưng!", "Vietnamese Female");
    }

    async function processAI(txt) {
        if(document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        
        // 💥 BƯỚC 1: LÀM SẠCH NỘI DUNG (Nuốt từ khóa hoàn thành)
        let normalized = txt.toLowerCase();
        
        // Kiểm tra xem có từ khóa hoàn thành không
        const isDone = /\bxong\b|\bđã\b|\brồi\b/.test(normalized);
        
        // Xóa sạch các chữ xong/đã/rồi khỏi nội dung note
        let cleanText = txt.replace(/\bxong\b|\bđã\b|\brồi\b/gi, "").trim();

        // 💥 BƯỚC 2: KIỂM TRA LẠI (Nếu nội dung note trống rỗng thì không lưu)
        if (!cleanText || cleanText.length < 1) {
            responsiveVoice.speak("Cưng nói gì vậy? Tui nghe hổng rõ!", "Vietnamese Female");
            return;
        }

        const p = `Phân loại "${cleanText}" vào "work" hoặc "personal". JSON: {"type": "work/personal", "reply": "khịa cưng", "text": "nội dung sạch"}`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const d = await res.json();
            const resAI = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, ""));
            
            // Chống trùng note trong cùng một lần nói
            const isDuplicate = notes.some(n => n.text.toLowerCase() === resAI.text.toLowerCase() && n.done === isDone);
            if(isDuplicate) return;

            // 💥 BƯỚC 3: LƯU NOTE SẠCH VỚI TRẠNG THÁI DONE ĐÚNG
            notes.unshift({ id: Date.now(), text: resAI.text, type: resAI.type, done: isDone });
            save();
            responsiveVoice.speak(isDone ? "Làm xong rồi hả cưng? Giỏi ta!" : resAI.reply, "Vietnamese Female");
        } catch(e) { 
            // Fallback nếu AI lag, vẫn nuốt từ khóa
            notes.unshift({ id: Date.now(), text: cleanText, type: 'work', done: isDone }); 
            save(); 
        }
    }

    function save() { localStorage.setItem('notezy_v41', JSON.stringify(notes)); render(); }
    function render() {
        const l = document.getElementById('list'); l.innerHTML = '';
        notes.forEach(n => {
            l.innerHTML += `<div class="card ${n.done?'done':''}" style="border-left-color:${n.type==='work'?'#B794F4':'#F6AD55'}">
                <div class="check-box ${n.done?'checked':''}" onclick="toggleDone(${n.id})"></div>
                <span style="flex:1; font-weight:800; font-size:1.05rem;">${n.text}</span>
                <span class="material-icons-round" style="opacity:0.1; padding-left:10px;" onclick="del(${n.id})">delete</span>
            </div>`;
        });
    }

    function toggleDone(id) {
        const n = notes.find(x => x.id === id);
        if(n) { n.done = !n.done; if(n.done) responsiveVoice.speak("Tuyệt vời nà cưng!", "Vietnamese Female"); save(); }
    }

    function addManual() {
        const val = document.getElementById('manualInput').value;
        if(val) { processAI(val); closeModal(); document.getElementById('manualInput').value=''; }
    }

    function showModal() { document.getElementById('inputModal').style.display='flex'; document.getElementById('manualInput').focus(); }
    function closeModal() { document.getElementById('inputModal').style.display='none'; }
    function switchPage(p) { document.getElementById('landing').className='screen hidden'; document.getElementById('workspace').className='screen active'; render(); }
    function del(id) { notes = notes.filter(n => n.id !== id); save(); }
    window.onload = render;
</script>
</body>
</html>
