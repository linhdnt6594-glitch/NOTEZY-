<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notezy V7 - Classic</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

    <style>
        :root {
            --bg: #F1F5F9;
            --theme: #B794F4;
            --text: #2D3748;
            --card: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            background: var(--bg); color: var(--text); 
        }

        .screen { 
            position: absolute; width: 100%; height: 100%; 
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
            display: flex; flex-direction: column; padding: 30px 25px; 
            box-sizing: border-box; 
        }
        .hidden { transform: translateY(100vh); opacity: 0; pointer-events: none; }
        .active { transform: translateY(0); opacity: 1; z-index: 10; }

        /* Logo Sổ 3D Classic */
        .hologram-book { 
            width: 220px; height: 300px; background: rgba(255,255,255,0.8); 
            border-radius: 40px; border: 2px solid white; 
            display: flex; justify-content: center; align-items: center; 
            animation: float 4s infinite; backdrop-filter: blur(10px); 
            cursor: pointer; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .hologram-book::before { content: '📓'; font-size: 150px; }
        @keyframes float { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-25px);} }

        /* Tab Bar V7 */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 15px; border-radius: 15px; text-align: center; 
            font-weight: 900; background: rgba(0,0,0,0.03); border: 2px solid transparent; 
            cursor: pointer; transition: 0.3s;
        }
        .active-tab { border-color: var(--theme); color: var(--theme); background: white; }

        /* List Note */
        .list { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            margin-bottom: 12px; display: flex; align-items: center; 
            border: 1px solid rgba(0,0,0,0.02); animation: pop 0.4s; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .card.done span { text-decoration: line-through; opacity: 0.4; }
        @keyframes pop { from {transform: scale(0.9); opacity: 0;} }
        
        .check-box { 
            width: 24px; height: 24px; border-radius: 7px; border: 2px solid #cbd5e0; 
            margin-right: 15px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .check-box.checked { background: #4ADE80; border-color: #4ADE80; }
        .check-box.checked::after { content: '✓'; color: white; font-weight: 900; }

        /* Mic Button Classic */
        .mic { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 85px; height: 85px; border-radius: 50%; background: white; 
            display: flex; justify-content: center; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; cursor: pointer; 
        }
        .mic-on { background: #ff4757; color: white; animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% {box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);} 70% {box-shadow: 0 0 0 25px rgba(255, 71, 87, 0);} }
    </style>
</head>
<body>

<div id="landing" class="screen active">
    <div class="hologram-book" onclick="switchPage('workspace')"></div>
    <p style="margin-top: 30px; font-weight: 900; text-align: center;">BẤM ĐỂ MỞ SỔ ĐI CƯNG!</p>
</div>

<div id="workspace" class="screen hidden">
    <h1 style="font-weight:900; letter-spacing:-1.5px; margin-bottom: 20px;">Não lag? Mở Notezy 😎</h1>
    <div class="tab-bar">
        <div id="t-w" class="tab-btn active-tab" onclick="setTab('work')">CÔNG VIỆC</div>
        <div id="t-p" class="tab-btn" onclick="setTab('personal')">CÁ NHÂN</div>
    </div>
    <div id="list" class="list"></div>
</div>

<div class="mic" id="master-mic" onclick="toggleSpeech()">
    <span class="material-icons-round" style="font-size: 40px;">mic</span>
</div>

<script>
    const KEY = "AIzaSyBguiessoOjSXzzM5BmZ4kd9Si3BSIg4Ng";
    let notes = JSON.parse(localStorage.getItem('notezy_v7_classic')) || [];
    let currentTab = 'work', rec, isListening = false;

    function toggleSpeech() {
        if(!isListening) {
            initSpeech();
            responsiveVoice.speak("Hóng nà cưng!", "Vietnamese Female");
        } else {
            isListening = false;
            if(rec) rec.stop();
            document.getElementById('master-mic').classList.remove('mic-on');
        }
    }

    function initSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        rec = new Speech(); rec.lang = 'vi-VN'; rec.continuous = false;
        rec.onstart = () => { 
            isListening = true; 
            document.getElementById('master-mic').classList.add('mic-on'); 
        };
        rec.onresult = (e) => { 
            const txt = e.results[0][0].transcript;
            processAI(txt);
        };
        rec.onend = () => { 
            document.getElementById('master-mic').classList.remove('mic-on');
            isListening = false;
        };
        rec.start();
    }

    async function processAI(txt) {
        if(document.getElementById('landing').classList.contains('active')) switchPage('workspace');
        const isDone = /xong|đã|rồi/.test(txt.toLowerCase());
        const p = `Phân loại
